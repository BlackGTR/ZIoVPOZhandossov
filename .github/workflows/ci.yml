name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  build-test-package:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: antivirus
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d antivirus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/antivirus
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: CI_JWT_SECRET_KEY_AT_LEAST_32_CHARS_LONG_2026
      SSL_KEYSTORE_PASSWORD: ${{ secrets.SSL_KEYSTORE_PASSWORD }}
      SIGNATURE_KEY_STORE_PASSWORD: ${{ secrets.SSL_KEYSTORE_PASSWORD }}
      SIGNATURE_PUBLIC_KEY: ${{ vars.SIGNATURE_PUBLIC_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Restore TLS keystore from secret
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.SSL_KEYSTORE_P12_B64 }}" | base64 -d > src/main/resources/antivirus.p12

      - name: Compile
        run: mvn -B -DskipTests compile

      - name: Test
        run: mvn -B test

      - name: Package
        run: mvn -B -DskipTests package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: antivirus-jar
          path: target/*.jar
