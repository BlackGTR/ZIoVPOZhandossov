name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:

jobs:
  build-test-package:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: antivirus
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d antivirus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/antivirus
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: CI_JWT_SECRET_KEY_AT_LEAST_32_CHARS_LONG_2026
      SSL_KEYSTORE_PASSWORD: ${{ secrets.SSL_KEYSTORE_PASSWORD }}
      SIGNATURE_KEY_STORE_PASSWORD: ${{ secrets.SSL_KEYSTORE_PASSWORD }}
      SIGNATURE_PUBLIC_KEY: ${{ vars.SIGNATURE_PUBLIC_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Restore TLS keystore from secret
        env:
          SSL_KEYSTORE_P12_B64: ${{ secrets.SSL_KEYSTORE_P12_B64 }}
          SSL_KEYSTORE_BASE64: ${{ secrets.SSL_KEYSTORE_BASE64 }}
        run: |
          set -e
          KEYSTORE_B64="${SSL_KEYSTORE_P12_B64:-$SSL_KEYSTORE_BASE64}"
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::Missing TLS keystore secret. Create SSL_KEYSTORE_P12_B64 (preferred) or SSL_KEYSTORE_BASE64."
            exit 1
          fi
          if [ -z "${SSL_KEYSTORE_PASSWORD}" ]; then
            echo "::error::Missing SSL_KEYSTORE_PASSWORD secret."
            exit 1
          fi
          mkdir -p src/main/resources
          export KEYSTORE_B64
          python - <<'PY'
import base64
import os
import pathlib
import sys

raw = os.environ.get("KEYSTORE_B64", "")
clean = "".join(raw.split())
if not clean:
    print("::error::Keystore base64 secret is empty after whitespace cleanup.", file=sys.stderr)
    sys.exit(1)

decoded = None
for padding in ("", "=", "==", "==="):
    try:
        decoded = base64.b64decode(clean + padding, validate=True)
        break
    except Exception:
        pass

if not decoded:
    print("::error::Invalid base64 in keystore secret. Re-create SSL_KEYSTORE_P12_B64 from raw .p12 bytes.", file=sys.stderr)
    sys.exit(1)

path = pathlib.Path("src/main/resources/antivirus.p12")
path.write_bytes(decoded)
PY
          test -s src/main/resources/antivirus.p12

      - name: Compile
        run: mvn -B -DskipTests compile

      - name: Test
        run: mvn -B test

      - name: Package
        run: mvn -B -DskipTests package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: antivirus-jar
          path: target/*.jar
